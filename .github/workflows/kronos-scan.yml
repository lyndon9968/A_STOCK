name: Kronos Daily Scanner

on:
  schedule:
    - cron: '0 10 * * 1-5' # 每天北京时间 18:00 (UTC 10:00) 运行一次
  workflow_dispatch:      # 允许在 GitHub Actions 界面上手动点击 "Run workflow" 运行

permissions:
  contents: write         # 关键：赋予 Action 写入并推送文件回仓库的权限

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          persist-credentials: true # 使用默认的 GITHUB_TOKEN 配置凭据，保证可以 push

      - name: Clone Kronos Engine
        run: |
          git clone https://github.com/shiyu-coder/Kronos.git Kronos

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # 自动缓存依赖，提升运行速度

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # 安装 CPU 版本的 PyTorch（更轻量，适合 GitHub Actions 运行）
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install akshare pandas numpy huggingface_hub requests urllib3

      - name: Run Kronos Scan
        run: |
          python kronos_scan.py

      - name: Commit and Push results
        run: |
          # 配置 git 签名
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 暂存生成的 json 数据文件
          git add latest_scan.json
          git status
          
          # 仅在数据发生改变时才执行 commit & push，避免空提交报错
          if ! git diff-index --quiet HEAD; then
            git commit -m "chore: auto-update latest stock scan predictions [skip ci]"
            git push origin HEAD
            echo "✅ 预测数据更新并成功推送至 GitHub 仓库！"
          else
            echo "ℹ️ 数据未发生变化，无需提交。"
          fi
