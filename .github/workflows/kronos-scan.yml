name: Run Kronos Scan

on:
  workflow_dispatch:  # 允许在 Github 网页上手动点击按钮触发运行
  schedule:
    - cron: '30 9 * * 1-5'  # 选填：定时任务（这里举例周一到周五每天北京时间17:30自动执行。Github使用UTC时间，9:30 UTC = 17:30 北京时间）

jobs:
  run-scan:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout current repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # 缓存pip依赖，加快下次运行速度

    - name: Clone Kronos repository
      run: |
        # 到作者的仓库中把相关的 Kronos 模型代码拉取下来并把 model 文件夹复制进根目录
        git clone https://github.com/shiyu-coder/Kronos.git KronosRepo
        cp -r KronosRepo/model ./model
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        
        # 1. 安装 Kronos 原生要求的各种特定版本依赖
        pip install numpy "pandas==2.2.2" "torch>=2.0.0" "einops==0.8.1" "huggingface_hub==0.33.1" "matplotlib==3.9.3" "tqdm==4.67.1" "safetensors==0.6.2"
        
        # 2. 安装你自己的 Python 脚本附加需要的依赖（比如 akshare）
        # (如果您还用到了 yfinance 等其他包，记得在这里加上)
        pip install akshare
        
    - name: Run Scan Script
      run: |
        python kronos_scan.py
